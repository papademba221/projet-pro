<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détail Hôtel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/details.css">
</head>
<body>

<div class="page">

  <a href="/pages/liste.html" class="back" onclick="goBack(event)">
    <span class="back-arrow">←</span> Retour
  </a>

  <div class="detail">

    <!-- Côté visuel -->
    <div class="visual">
      <img id="image" src="" alt="">
      <div class="visual-veil"></div>
      <span class="eyebrow" id="stars-badge"><span id="stars"></span> ★</span>
    </div>

    <!-- Côté info -->
    <div class="texte">

      <div class="heading">
        <p class="eyebrow-label">Fiche établissement</p>
        <h1 id="name"></h1>
        <p class="location">
          <svg class="pin" viewBox="0 0 24 24" fill="none" width="14" height="14">
            <path d="M12 21s7-7.58 7-12.5S16.42 1 12 1 5 4.08 5 8.5 12 21 12 21z" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="12" cy="8.5" r="2.5" stroke="currentColor" stroke-width="1.6"/>
          </svg>
          <span id="location"></span>
        </p>
      </div>

      <dl class="facts">
        <div class="fact">
          <dt>Contact</dt>
          <dd id="email"></dd>
        </div>
        <div class="fact">
          <dt>Téléphone</dt>
          <dd id="telephone"></dd>
        </div>
        <div class="fact">
          <dt>Restauration</dt>
          <dd id="restaurant"></dd>
        </div>
      </dl>

      <!-- Billet prix -->
      <div class="ticket">
        <div class="ticket-left">
          <span class="ticket-label">Tarif / nuit</span>
          <span class="ticket-price"><span id="prix"></span> <span id="devise"></span></span>
        </div>
        <div class="ticket-perf"></div>
        <div class="ticket-right">
          <span class="ticket-label">Réf.</span>
          <span class="ticket-id" id="hotel-id"></span>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
function goBack(e){
  e.preventDefault();
  window.location.href = "/pages/liste.html";
}
</script>

<script src="../js/details.js" type="module"></script>

</body>
</html>
