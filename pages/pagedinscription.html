<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="/styles/pagedinscription.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <div class="container">

        <div class="logo">
            <span class="icon"><i class="fa-solid fa-bookmark" ></i></span>
            <h2>RED PRODUCT</h2>
        </div>

        <div class="login-box">
            <p class="title">Inscrivez-vous en tant que Admin</p>

            <form method="post">
                <label for="nom">Nom</label>
                <input type="text" id="nom" name="nom" required>
                
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>
            </form>

            <div class="remember">
                <input type="checkbox" id="remember-me">
                <label for="remember-me">Accepter les termes et la politique</label>
            </div>

                <button type="submit">S'inscrire</button>
            
            <div class="links">
                <p>Vous avez déjà un compte? <a href="/index.html">Se connecter</a></p>
            </div>
        </div>

        

    </div>
</body>
</html>
