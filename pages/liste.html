<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/styles/liste.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2 class="logo"><i class="fa-solid fa-bookmark"></i>  RED PRODUCT</h2>
            <nav role="navigation">
                <div class="gauche">
                    <p class="p">Principal</p>
                    <ul>
                        <li><i class="fa-solid fa-chart-line"></i> <a href="/pages/board.html">Dashboard</a> </li>
                        <li><i class="fa-solid fa-desktop"></i> Liste des hôtels</li>
                    </ul>
                </div>
            </nav>
            <div class="user">
                <img src="../img/PHOTO FOR FLYER.jpg" alt="">
                <div>
                    <p>Mouhamet Badiane</p>
                    <p><span class="sp">●</span>  en ligne</p>
                </div>
            </div>
        </aside>
        <!-- MAIN -->
        <main class="main">
            <!-- HEADER -->
            <header class="header">
                <button class="menu-toggle">☰</button>
                <h1>Liste des hôtels</h1>
                <div class="recherche">
                    <input type="text" placeholder="Recherche">
                </div>
                <div class="notifs">
                    <div class="cloche">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge">3</span>
                    </div>
                    <img src="../img/PHOTO FOR FLYER.jpg" class="tof" alt="">
                    <span class="sp1">●</span>
                    <div class="bracket">
                        <a href="/index.html"><i class="fa-solid fa-right-to-bracket"></i></a>
                    </div>
                </div>
            </header> 
            
            
            <section class="bienvenue">
                <h2>Hôtels  8</h2>
                <button class="mobile-create-btn" onclick="togglePopup()">+ Créer un nouveau hôtel</button>


                
            </section>
            <!-- CARDS -->
            <div class="cards">
                
            </div>
        </main>
    </div>

    
    <div id="modal-card">
<h2> CRÉER UN NOUVEAU HÔTEL</h2>
            <button class="close-btn" onclick="togglePopup()">×</button>

            <form>
                <div class="form-grid">

                    <div class="form-group">
                        <label>Nom de l'hôtel</label>
                        <input type="text" placeholder="CAP Marniane">
                    </div>

                    <div class="form-group">
                        <label>Adresse</label>
                        <input type="text" placeholder="Les îles du saloum, Mar Lodj">
                    </div>

                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" placeholder="information@gmail.com">
                    </div>

                    <div class="form-group">
                        <label>Numéro de téléphone</label>
                        <input type="text" placeholder="+221 77 777 77 77">
                    </div>

                    <div class="form-group">
                        <label>Prix par nuit</label>
                        <input type="text" placeholder="25.000 XOF">
                    </div>

                    <div class="form-group">
                        <label for="devise">Devise</label>
                        <select name="devise" id="devise">
                            <option>F XOF</option>
                            <option>EUR</option>
                            <option>USD</option>
                        </select>
                    </div>

                </div>

                <div class="telecharger">
                    <p>Ajouter une photo</p>
                    <div class="telecharger-box">
                        <span>📷</span>
                        <p>Ajouter une photo</p>
                        <input type="file" id="photo" hidden>
                    </div>
                </div>

                <button type="submit">Enregistrer</button>

            </form>
    </div>

    
    <script>
        const toggle = document.querySelector('.menu-toggle');
        const sidebar = document.querySelector('.sidebar');
        toggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

function togglePopup() {
            const popup = document.getElementById("modal-card");
            if (popup) {
                popup.classList.toggle("open");
            }
        }

function goTodetail(id) {
            window.location.href = `/details.html?id=${id}`;
            }
           window.togglePopup= togglePopup;
           window.goTodetail= goTodetail;
                    
    </script>

    <script src="/liste.js" type="module"></script>
</body>
</html>
