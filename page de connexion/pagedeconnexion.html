<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Red Product</title>
    <link rel="stylesheet" href="pagedeconnexion.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

<div class="container">

    <div class="logo">
        <span class="icon"><i class="fa-solid fa-bookmark" style="color: rgb(235, 238, 243);"></i>
        </span>
        <h2>RED PRODUCT</h2>
    </div>

    <div class="login-box">
        <p class="title">Connectez-vous en tant que Admin</p>

        <form>
            <input type="email" placeholder="E-mail" required>
            <input type="password" placeholder="Mot de passe" required>

        <div class="remember">
            <input type="checkbox" id="remember">
            <label for="remember">Gardez-moi connecté</label>
        </div>

            <button type="submit">Se connecter</button>
        </form>
    </div>

    <div class="links">
        <a href="#" class="forgot">Mot de passe oublié?</a>
        <p>Vous n'avez pas de compte? <a href="#">S'inscrire</a></p>
    </div>

</div>

</body>
</html>
